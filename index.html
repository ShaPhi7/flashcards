<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chinese Flashcards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1115;
      --surface: #1a1d24;
      --surface-2: #242832;
      --on-surface: #e8eaed;
      --on-surface-dim: #9aa0a6;
      --primary: #7aa7ff;
      --accent: #80cbc4;
      --divider: #2e333d;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background-color: var(--bg);
      color: var(--on-surface);
      font-family: 'Noto Sans SC', 'Microsoft YaHei', 'PingFang SC', 'Heiti SC', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      gap: 1.25rem;
    }
    header {
      width: 100%;
      max-width: 520px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--on-surface-dim);
    }
    #deckSelector {
      background-color: var(--surface);
      color: var(--on-surface);
      border: 1px solid var(--divider);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      outline: none;
    }
    #deckSelector:focus { border-color: var(--primary); }
    #singleTapLabel {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--on-surface-dim);
      cursor: pointer;
      user-select: none;
    }
    #singleTapCheckbox {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    #flashcard-container {
      position: relative;
      width: 100%;
      max-width: 520px;
      aspect-ratio: 3 / 4;
    }
    #card {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, var(--surface-2) 0%, var(--surface) 100%);
      border: 1px solid var(--divider);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.12s ease;
      overflow: hidden;
    }
    #card:active { transform: scale(0.985); }
    .card-main {
      width: 100%;
      white-space: pre-line;
      word-break: break-word;
    }
    #card.front .card-main {
      font-size: 4rem;
      font-weight: 500;
      color: var(--on-surface);
    }
    #card.back .card-main {
      font-size: 1.35rem;
      color: var(--on-surface);
      line-height: 1.7;
    }
    #card.small .card-main { font-size: 1rem; }
    #card.small.front .card-main { font-size: 2.25rem; }
    .prev-answer {
      position: absolute;
      top: 1rem;
      left: 1rem;
      right: 1rem;
      background: rgba(15, 17, 21, 0.75);
      color: var(--accent);
      border: 1px solid rgba(128, 203, 196, 0.25);
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      font-size: 0.9rem;
      text-align: center;
      white-space: pre-line;
      backdrop-filter: blur(6px);
      z-index: 2;
      pointer-events: none;
    }
    footer {
      width: 100%;
      max-width: 520px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--on-surface-dim);
    }
    #state {
      color: var(--primary);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    @media (max-width: 480px) {
      #card.front .card-main { font-size: 3rem; }
      #card.back .card-main { font-size: 1.15rem; }
      header { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header>
    <h1>印 Flashcards</h1>
    <select id="deckSelector"></select>
  </header>

  <label id="singleTapLabel">
    <input type="checkbox" id="singleTapCheckbox" />
    Single tap
  </label>

  <div id="flashcard-container">
    <div id="card" class="front"><div class="card-main"></div></div>
  </div>

  <footer>
    <div id="counter">Card 0 of 0</div>
    <div id="state">LOADING</div>
  </footer>

<script>
const decks = {};
function registerDeck(name, cards) {
    decks[name] = cards;
}
</script>

<script src="decks/colours.js"></script>
<script src="decks/weather.js"></script>
<script src="decks/lesson1.js"></script>
<script src="decks/feelings.js"></script>
<script src="decks/sports.js"></script>
<script src="decks/travel.js"></script>
<script src="decks/ability.js"></script>
<script src="decks/time_duration.js"></script>
<script src="decks/daily_life.js"></script>
<script src="decks/workbook_vocab.js"></script>
<script src="decks/travel_city_life.js"></script>
<script src="decks/daily_routine_transportation.js"></script>
<script src="decks/exams_career_life.js"></script>

<script>
    let currentDeck = [];
    let currentIndex = 0;
    let isFront = true;
    let singleTapMode = false;

    const deckSelector = document.getElementById("deckSelector");
    const singleTapCheckbox = document.getElementById("singleTapCheckbox");
    const cardEl = document.getElementById("card");
    const cardMain = cardEl.querySelector(".card-main");
    const counterEl = document.getElementById("counter");
    const stateEl = document.getElementById("state");
    const container = document.getElementById("flashcard-container");

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function getBriefAnswer(card) {
        if (!card || !card.back) return "";
        const text = card.back;
        const optionsIndex = text.indexOf("Options:");
        if (optionsIndex !== -1) {
            const afterOptions = text.slice(optionsIndex + "Options:".length);
            const lines = afterOptions.split("\n").map(l => l.trim()).filter(Boolean);
            if (lines.length >= 3) {
                const firstLine = lines[0].replace(/^\d+\.\s*/, "");
                return [firstLine, lines[1], lines[2]].join("\n");
            }
            return lines.slice(0, 3).join("\n");
        }
        const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
        return lines.slice(0, 3).join("\n");
    }

    function clearPreview() {
        const existing = container.querySelector(".prev-answer");
        if (existing) existing.remove();
    }

    function showPreview(card) {
        clearPreview();
        const el = document.createElement("div");
        el.className = "prev-answer";
        el.textContent = getBriefAnswer(card);
        container.insertBefore(el, cardEl);
    }

    function render() {
        const card = currentDeck[currentIndex];
        clearPreview();
        cardEl.classList.remove("front", "back", "small");

        if (singleTapMode) {
            cardEl.classList.add("front");
            cardMain.textContent = card.front;
            stateEl.textContent = "TAP TO ADVANCE";
            if (currentIndex > 0) showPreview(currentDeck[currentIndex - 1]);
        } else if (isFront) {
            cardEl.classList.add("front");
            cardMain.textContent = card.front;
            stateEl.textContent = "FRONT";
        } else {
            cardEl.classList.add("back");
            cardMain.textContent = card.front + "\n\n━━━━━━━━━━\n\n" + card.back;
            stateEl.textContent = "BACK";
        }

        if ((card.front + card.back).length > 120) cardEl.classList.add("small");
        counterEl.textContent = "Card " + (currentIndex + 1) + " of " + currentDeck.length;
    }

    function advanceCard() {
        if (currentIndex + 1 >= currentDeck.length) {
            shuffle(currentDeck);
            currentIndex = 0;
        } else {
            currentIndex++;
        }
        isFront = true;
    }

    function retreatCard() {
        if (currentIndex > 0) currentIndex--;
    }

    cardEl.addEventListener("click", (e) => {
        const rect = cardEl.getBoundingClientRect();
        const isRight = (e.clientX - rect.left) > rect.width / 2;

        if (singleTapMode) {
            if (isRight) advanceCard(); else retreatCard();
            render();
            return;
        }

        if (isRight) {
            if (isFront) isFront = false; else advanceCard();
        } else {
            if (!isFront) isFront = true; else { retreatCard(); isFront = false; }
        }
        render();
    });

    singleTapCheckbox.addEventListener("change", () => {
        singleTapMode = singleTapCheckbox.checked;
        isFront = true;
        clearPreview();
        render();
    });

    deckSelector.addEventListener("change", () => loadDeck(deckSelector.value));

    function populateDeckSelector() {
        deckSelector.innerHTML = "";
        for (const name of Object.keys(decks)) {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            deckSelector.appendChild(opt);
        }
    }

    function loadDeck(name) {
        currentDeck = shuffle(decks[name].slice());
        currentIndex = 0;
        isFront = true;
        clearPreview();
        render();
    }

    populateDeckSelector();
    if (Object.keys(decks).length > 0) {
        loadDeck(Object.keys(decks)[0]);
    }
</script>
</body>
</html>
