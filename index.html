<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Flashcards</title>

<style>

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;

    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}

#deckSelector {
    width: 90%;
    max-width: 500px;
    margin-top: 15px;

    padding: 12px;
    font-size: 18px;

    background: #111;
    color: white;

    border: 1px solid #444;
    border-radius: 8px;
}

#counter {
    margin-top: 12px;
    font-size: 18px;
}

#state {
    margin-top: 6px;
    font-size: 14px;
    color: #aaa;
}

#card {
    width: 92%;
    max-width: 720px;
    min-height: 65vh;

    margin: 20px 0;

    border: 1px solid #666;
    border-radius: 18px;

    padding: 28px;

    display: flex;
    align-items: center;
    justify-content: center;

    text-align: center;
    white-space: pre-wrap;
    overflow-wrap: break-word;

    font-size: 2rem;
    line-height: 1.5;

    cursor: pointer;
}

.front {
    background: #5a1f1f; /* lighter red */
}

.back {
    background: #5a531f; /* lighter yellow */
}

.small {
    font-size: 1.4rem;
}

</style>
</head>

<body>

<select id="deckSelector"></select>

<div id="counter"></div>
<div id="state"></div>

<div id="card"></div>

<script>

const decks = {};

// register decks from files
function registerDeck(name, cards) {
    decks[name] = cards;
}

// safe script loader
function loadScript(src) {
    return new Promise(resolve => {

        const s = document.createElement("script");

        s.src = src;

        s.onload = () => resolve(true);

        s.onerror = () => {
            console.warn("Failed to load:", src);
            resolve(false);
        };

        document.body.appendChild(s);
    });
}

// load deck list from GitHub API
async function loadDeckFiles() {

    const url = "https://api.github.com/repos/shaphi7/flashcards/contents/decks";

    const res = await fetch(url);

    const files = await res.json();

    return files
        .filter(f => f.name.endsWith(".js"))
        .map(f => f.download_url);
}

// load all decks
async function loadAllDecks() {

    const files = await loadDeckFiles();

    for (const file of files) {
        await loadScript(file);
    }

    initApp();
}

</script>

<script>

// UI logic

const selector = document.getElementById("deckSelector");
const cardEl = document.getElementById("card");
const counterEl = document.getElementById("counter");
const stateEl = document.getElementById("state");

let cards = [];
let index = 0;
let showingBack = false;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
}

function loadDeck(name) {

    cards = [...decks[name]];
    shuffle(cards);

    index = 0;
    showingBack = false;

    render();
}

function render() {

    if (!cards.length) return;

    const card = cards[index];

    counterEl.textContent = `Card ${index + 1} / ${cards.length}`;

    if (!showingBack) {

        stateEl.textContent = "FRONT";
        cardEl.className = "front";
        cardEl.textContent = card.front;

    } else {

        stateEl.textContent = "BACK";
        cardEl.className = "back";

        cardEl.textContent =
            card.front +
            "\n\n━━━━━━━━━━\n\n" +
            card.back;

        if ((card.front + card.back).length > 120) {
            cardEl.classList.add("small");
        }
    }
}

cardEl.addEventListener("click", () => {

    if (!showingBack) {
        showingBack = true;
    } else {
        showingBack = false;
        index++;

        if (index >= cards.length) {
            shuffle(cards);
            index = 0;
        }
    }

    render();
});

function initApp() {

    const names = Object.keys(decks);

    selector.innerHTML = "";

    for (const n of names) {

        const opt = document.createElement("option");

        opt.value = n;
        opt.textContent = n;

        selector.appendChild(opt);
    }

    selector.addEventListener("change", e => {
        loadDeck(e.target.value);
    });

    loadDeck(names[0]);
}

// start
loadAllDecks();

</script>

</body>
</html>
