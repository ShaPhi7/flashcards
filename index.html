<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chinese Flashcards</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;

    display: flex;
    flex-direction: column;
    align-items: center;

    min-height: 100vh;
}

#deckSelector {
    margin-top: 15px;
    width: 90%;
    max-width: 500px;

    padding: 12px;
    font-size: 18px;

    background: #111;
    color: white;
    border: 1px solid #555;
    border-radius: 8px;
}

#counter {
    margin-top: 12px;
    font-size: 18px;
}

#state {
    margin-top: 8px;
    font-size: 14px;
    opacity: 0.8;
}

#card {
    width: 90%;
    max-width: 700px;
    min-height: 65vh;

    margin-top: 20px;
    margin-bottom: 20px;

    border: 3px solid white;
    border-radius: 20px;

    display: flex;
    justify-content: center;
    align-items: center;

    text-align: center;

    padding: 25px;

    white-space: pre-wrap;
    overflow-wrap: break-word;

    font-size: 2rem;

    transition: background-color 0.2s;
}

.front {
    background: rgba(255, 0, 0, 0.15);
}

.back {
    background: rgba(255, 255, 0, 0.15);
}

.small {
    font-size: 1.5rem;
}
</style>

</head>

<body>

<select id="deckSelector"></select>

<div id="counter"></div>
<div id="state"></div>

<div id="card"></div>

<script>

const decks = {

colours: [

{type:1,front:"红色",back:"Red"},
{type:2,front:"Red",back:"红色\nhóng sè"},
{type:3,front:"hong se",back:"Red\n\n红色\n\nhóng sè"},

{type:1,front:"蓝色",back:"Blue"},
{type:2,front:"Blue",back:"蓝色\nlán sè"},
{type:3,front:"lan se",back:"Blue\n\n蓝色\n\nlán sè"},

{type:1,front:"黄色",back:"Yellow"},
{type:2,front:"Yellow",back:"黄色\nhuáng sè"},
{type:3,front:"huang se",back:"Yellow\n\n黄色\n\nhuáng sè"},

{type:1,front:"绿色",back:"Green"},
{type:2,front:"Green",back:"绿色\nlǜ sè"},
{type:3,front:"lü se",back:"Green\n\n绿色\n\nlǜ sè"},

{type:1,front:"黑色",back:"Black"},
{type:2,front:"Black",back:"黑色\nhēi sè"},
{type:3,front:"hei se",back:"Black\n\n黑色\n\nhēi sè"},

{type:1,front:"白色",back:"White"},
{type:2,front:"White",back:"白色\nbái sè"},
{type:3,front:"bai se",back:"White\n\n白色\n\nbái sè"},

{type:1,front:"橙色",back:"Orange"},
{type:2,front:"Orange",back:"橙色\nchéng sè"},
{type:3,front:"cheng se",back:"Orange\n\n橙色\n\nchéng sè"},

{type:1,front:"紫色",back:"Purple"},
{type:2,front:"Purple",back:"紫色\nzǐ sè"},
{type:3,front:"zi se",back:"Purple\n\n紫色\n\nzǐ sè"},

{type:1,front:"粉红色",back:"Pink"},
{type:2,front:"Pink",back:"粉红色\nfěn hóng sè"},
{type:3,front:"fen hong se",back:"Pink\n\n粉红色\n\nfěn hóng sè"},

{type:1,front:"棕色",back:"Brown"},
{type:2,front:"Brown",back:"棕色\nzōng sè"},
{type:3,front:"zong se",back:"Brown\n\n棕色\n\nzōng sè"},

{
type:4,
front:"蓝色是我最喜欢的____。",
back:"colour\n\n颜色\n\nyán sè\n\nOptions:\n1. 颜色\n2. 老师\n3. 医生\n4. 学生\n5. 名字"
},
{
type:4,
front:"我的工作是____。",
back:"teacher\n\n老师\n\nlǎo shī\n\nOptions:\n1. 红色\n2. 老师\n3. 蓝色\n4. 黄色\n5. 颜色"
},
{
type:4,
front:"香蕉是____。",
back:"yellow\n\n黄色\n\nhuáng sè\n\nOptions:\n1. 黄色\n2. 蓝色\n3. 紫色\n4. 棕色\n5. 黑色"
},
{
type:4,
front:"草是____。",
back:"green\n\n绿色\n\nlǜ sè\n\nOptions:\n1. 白色\n2. 绿色\n3. 红色\n4. 棕色\n5. 黑色"
},
{
type:4,
front:"天空是____。",
back:"blue\n\n蓝色\n\nlán sè\n\nOptions:\n1. 蓝色\n2. 黄色\n3. 棕色\n4. 紫色\n5. 粉红色"
},
{
type:4,
front:"熊猫是____和____。",
back:"black and white\n\n黑色和白色\n\nhēi sè hé bái sè\n\nOptions:\n1. 黑色\n2. 白色\n3. 蓝色\n4. 红色\n5. 紫色"
},
{
type:4,
front:"巧克力通常是____。",
back:"brown\n\n棕色\n\nzōng sè\n\nOptions:\n1. 棕色\n2. 绿色\n3. 蓝色\n4. 黄色\n5. 紫色"
},
{
type:4,
front:"葡萄可以是____。",
back:"purple\n\n紫色\n\nzǐ sè\n\nOptions:\n1. 红色\n2. 蓝色\n3. 紫色\n4. 白色\n5. 黑色"
},
{
type:4,
front:"火车通常不是____。",
back:"pink\n\n粉红色\n\nfěn hóng sè\n\nOptions:\n1. 粉红色\n2. 黑色\n3. 蓝色\n4. 红色\n5. 白色"
},
{
type:4,
front:"橙子是____。",
back:"orange\n\n橙色\n\nchéng sè\n\nOptions:\n1. 蓝色\n2. 绿色\n3. 橙色\n4. 黑色\n5. 白色"
}

]

};

const selector = document.getElementById("deckSelector");
const cardElement = document.getElementById("card");
const counterElement = document.getElementById("counter");
const stateElement = document.getElementById("state");

let cards = [];
let currentCard = 0;
let showingBack = false;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function loadDeck(name) {

    cards = [...decks[name]];
    shuffle(cards);

    currentCard = 0;
    showingBack = false;

    render();
}

function render() {

    if (!cards.length) return;

    const card = cards[currentCard];

    counterElement.textContent =
        `Card ${currentCard + 1} of ${cards.length}`;

    if (showingBack) {

        stateElement.textContent = "BACK";

        cardElement.className = "back";

        cardElement.textContent = card.back;

        if (card.back.length > 120) {
            cardElement.classList.add("small");
        }

    } else {

        stateElement.textContent = "FRONT";

        cardElement.className = "front";

        cardElement.textContent = card.front;
    }
}

cardElement.addEventListener("click", () => {

    if (!showingBack) {

        showingBack = true;

    } else {

        showingBack = false;

        currentCard++;

        if (currentCard >= cards.length) {

            shuffle(cards);
            currentCard = 0;
        }
    }

    render();
});

Object.keys(decks).forEach(name => {

    const option = document.createElement("option");

    option.value = name;
    option.textContent = name;

    selector.appendChild(option);
});

selector.addEventListener("change", e => {
    loadDeck(e.target.value);
});

loadDeck("colours");

</script>

</body>
</html>
