<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chinese Flashcards</title>

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;

    background: #000;
    color: white;

    font-family: Arial, sans-serif;

    display: flex;
    flex-direction: column;
    align-items: center;
}

#deckSelector {

    width: 90%;
    max-width: 500px;

    margin-top: 15px;

    padding: 12px;

    background: #111;
    color: white;

    border: 1px solid #444;
    border-radius: 8px;

    font-size: 18px;
}

#counter {

    margin-top: 15px;

    font-size: 18px;
}

#state {

    margin-top: 5px;

    font-size: 14px;

    color: #bbb;

    letter-spacing: 1px;
}

#card {

    width: 92%;
    max-width: 700px;

    min-height: 65vh;

    margin-top: 20px;
    margin-bottom: 20px;

    border: 1px solid #555;
    border-radius: 18px;

    padding: 30px;

    display: flex;
    justify-content: center;
    align-items: center;

    text-align: center;

    white-space: pre-wrap;
    overflow-wrap: break-word;

    font-size: 2rem;
    line-height: 1.5;

    cursor: pointer;

    transition: background-color 0.2s;
}

.front {
    background: #6b2222;
}

.back {
    background: #7a6b20;
}

.small {
    font-size: 1.4rem;
}

</style>
</head>

<body>

<select id="deckSelector"></select>

<div id="counter"></div>
<div id="state"></div>

<div id="card"></div>

<script>

const decks = {};

function registerDeck(name, cards) {
    decks[name] = cards;
}

</script>

<script src="decks/colours.js"></script>

<script>

const selector = document.getElementById("deckSelector");
const cardElement = document.getElementById("card");
const counterElement = document.getElementById("counter");
const stateElement = document.getElementById("state");

let cards = [];
let currentCard = 0;
let showingBack = false;

function shuffle(array) {

    for (let i = array.length - 1; i > 0; i--) {

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];
    }
}

function loadDeck(name) {

    cards = [...decks[name]];

    shuffle(cards);

    currentCard = 0;
    showingBack = false;

    render();
}

function render() {

    if (!cards.length) return;

    const card = cards[currentCard];

    counterElement.textContent =
        `Card ${currentCard + 1} of ${cards.length}`;

    if (showingBack) {

        stateElement.textContent = "BACK";

        cardElement.className = "back";

        cardElement.textContent =
            card.front +
            "\n\n━━━━━━━━━━\n\n" +
            card.back;

        if ((card.front + card.back).length > 120) {
            cardElement.classList.add("small");
        }

    } else {

        stateElement.textContent = "FRONT";

        cardElement.className = "front";

        cardElement.textContent = card.front;
    }
}

cardElement.addEventListener("click", () => {

    if (!showingBack) {

        showingBack = true;

    } else {

        showingBack = false;

        currentCard++;

        if (currentCard >= cards.length) {

            shuffle(cards);

            currentCard = 0;
        }
    }

    render();
});

Object.keys(decks).forEach(name => {

    const option = document.createElement("option");

    option.value = name;
    option.textContent = name;

    selector.appendChild(option);
});

loadDeck(Object.keys(decks)[0]);

selector.addEventListener("change", e => {
    loadDeck(e.target.value);
});

</script>

</body>
</html>
